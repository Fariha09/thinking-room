<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 530 440" width="530" height="440">
  <defs>
    <radialGradient id="gbig" cx="38%" cy="24%" r="62%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="35%"  stop-color="#f4f3f8"/>
      <stop offset="70%"  stop-color="#dcdaec"/>
      <stop offset="100%" stop-color="#c4c2dc"/>
    </radialGradient>
    <radialGradient id="gsml" cx="40%" cy="26%" r="60%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="40%"  stop-color="#f0eff6"/>
      <stop offset="75%"  stop-color="#d8d6e8"/>
      <stop offset="100%" stop-color="#c0beda"/>
    </radialGradient>
    <radialGradient id="gbody" cx="46%" cy="16%" r="82%">
      <stop offset="0%"   stop-color="#f8f8fc"/>
      <stop offset="45%"  stop-color="#e8e6f4"/>
      <stop offset="80%"  stop-color="#ccc9e0"/>
      <stop offset="100%" stop-color="#b8b5d4"/>
    </radialGradient>
    <radialGradient id="gshine" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gdot" cx="35%" cy="30%" r="60%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="55%"  stop-color="#e8e8ee"/>
      <stop offset="100%" stop-color="#c8c6d8"/>
    </radialGradient>
    <clipPath id="cc">
      <path d="
        M 68 300 Q 30 298 18 272 Q 6 246 18 220
        Q 30 194 60 182 Q 52 130 88 104
        Q 124 78 164 88 Q 186 56 230 46
        Q 286 32 326 64 Q 358 40 400 50
        Q 446 60 462 100 Q 498 96 518 124
        Q 542 158 528 200 Q 514 238 480 252
        Q 456 260 390 266 Q 300 272 200 270
        Q 120 268 68 300 Z
      "/>
    </clipPath>
  </defs>

  <!-- Cloud base -->
  <path d="
    M 68 300 Q 30 298 18 272 Q 6 246 18 220
    Q 30 194 60 182 Q 52 130 88 104
    Q 124 78 164 88 Q 186 56 230 46
    Q 286 32 326 64 Q 358 40 400 50
    Q 446 60 462 100 Q 498 96 518 124
    Q 542 158 528 200 Q 514 238 480 252
    Q 456 260 390 266 Q 300 272 200 270
    Q 120 268 68 300 Z
  " fill="url(#gbody)"/>

  <!-- Small left bump -->
  <circle cx="142" cy="182" r="116" fill="url(#gsml)" clip-path="url(#cc)"/>

  <!-- Big right bump -->
  <circle cx="336" cy="144" r="160" fill="url(#gbig)" clip-path="url(#cc)"/>

  <!-- Glossy highlight big bump -->
  <ellipse cx="304" cy="94" rx="130" ry="56"
    fill="url(#gshine)" opacity="0.68"
    transform="rotate(-15, 304, 94)"
    clip-path="url(#cc)"/>

  <!-- Glossy highlight small bump -->
  <ellipse cx="120" cy="148" rx="56" ry="30"
    fill="url(#gshine)" opacity="0.52"
    transform="rotate(-10, 120, 148)"
    clip-path="url(#cc)"/>

  <!-- Bottom lavender shadow -->
  <path d="
    M 68 300 Q 30 298 18 272 Q 14 284 30 294
    Q 80 308 200 304 Q 340 300 480 280
    Q 510 272 528 256 Q 510 266 480 272
    Q 360 284 200 280 Q 80 276 68 300 Z
  " fill="#9e9bc0" opacity="0.13"/>

  <!-- Thought bubble tail -->
  <circle cx="62"  cy="322" r="16"  fill="url(#gdot)"/>
  <ellipse cx="56" cy="315" rx="6"   ry="4"   fill="#ffffff" opacity="0.75"/>

  <circle cx="38"  cy="354" r="11"  fill="url(#gdot)"/>
  <ellipse cx="34" cy="348" rx="4"   ry="2.8" fill="#ffffff" opacity="0.72"/>

  <circle cx="18"  cy="378" r="7"   fill="url(#gdot)"/>
  <ellipse cx="15" cy="374" rx="2.6" ry="1.8" fill="#ffffff" opacity="0.68"/>

</svg>
