<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comments — The Thinking Room</title>
  <link rel="stylesheet" href="/css/admin.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☁️</text></svg>">
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">The Thinking Room</div>
        <div class="sidebar-badge">Admin Panel</div>
      </div>
      <nav class="sidebar-nav">
        <a href="/admin">📋 &nbsp;Dashboard</a>
        <a href="/admin/new">✍️ &nbsp;New Post</a>
        <a href="/admin/comments" class="active">💬 &nbsp;Comments</a>
        <a href="/admin/subscribers">📧 &nbsp;Subscribers</a>
        <a href="/" target="_blank">🌸 &nbsp;View Blog</a>
      </nav>
      <div class="sidebar-footer"><a href="/admin/logout">🚪 Log out</a></div>
    </aside>
    <div class="admin-main">
      <div class="admin-topbar">
        <h1>Comments</h1>
        <span style="font-size:0.82rem;color:var(--ink-faint)">{{total}} total &nbsp;·&nbsp; <span style="color:var(--warn)">{{pending}} pending</span></span>
      </div>
      <div class="admin-content">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Comment</th>
                <th>Post</th>
                <th>Status</th>
                <th>Date</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>{{rows}}</tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
