<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — The Thinking Room</title>
  <link rel="stylesheet" href="/css/admin.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☁️</text></svg>">
</head>
<body>
  <div class="login-page">
    <div class="login-box">
      <div class="login-logo">The Thinking Room</div>
      <div class="login-sub">Admin Portal</div>
      <h2>Welcome back ✨</h2>
      {{error}}
      <form method="POST" action="/admin/login">
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password…" autofocus required>
        </div>
        <button type="submit" class="btn-login">Enter the Room →</button>
      </form>
      <p style="margin-top:24px;font-size:0.78rem;color:var(--ink-faint)">
        <a href="/" style="color:var(--ink-faint);text-decoration:none">← Back to blog</a>
      </p>
    </div>
  </div>
</body>
</html>
